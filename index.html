<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ════════════════════════════════════════════════════════
         TASK #7 — SEO + redes sociales + PWA basics
         (todo lo nuevo vs. tu index.html actual va comentado)
         ════════════════════════════════════════════════════════ -->

    <!-- Título visible en pestaña y en SERP (Google) -->
    <title>SideQuest — A social network for the real world</title>

    <!-- ── SEO básico ── -->
    <!-- description: lo que muestra Google bajo el título en sus resultados.
         150-160 caracteres ideal. -->
    <meta name="description" content="SideQuest is the social network for the real world. Find or create events around you and connect with friends — from screens to streets." />
    <!-- author/keywords son secundarios pero no hacen daño -->
    <meta name="author" content="SideQuest" />
    <!-- robots: index,follow es lo que queremos en producción. Cambia a
         "noindex,nofollow" si tienes una rama de staging pública. -->
    <meta name="robots" content="index,follow" />

    <!-- ── Color del chrome del navegador en móvil ── -->
    <!-- En Safari iOS pinta la barra de URL con este color.
         En Android pinta la barra de notificaciones.
         Usamos el negro de la app (#0b0d12) para que pase desapercibido. -->
    <meta name="theme-color" content="#0b0d12" />
    <!-- Para PWA "add to home screen" en iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SideQuest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Favicon e iconos ── -->
    <!-- Fix: el type correcto para PNG es "image/png" (tenías "icon"
         que es inválido y algunos navegadores ignoran). Añadimos
         leading slash para que Vite resuelva desde /public. -->
    <link rel="icon" type="image/png" href="/logoSideQuest.png" />
    <link rel="apple-touch-icon" href="/logoSideQuest.png" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn, Slack...) ── -->
    <!-- Cuando alguien pegue el link en cualquier red, mostrará esta
         tarjeta. Ajusta og:url al dominio final cuando hagas deploy. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SideQuest" />
    <meta property="og:title" content="SideQuest — A social network for the real world" />
    <meta property="og:description" content="Find or create events around you and connect with friends. From screens to streets." />
    <meta property="og:image" content="/logoSideQuest.png" />
    <meta property="og:image:alt" content="SideQuest logo" />
    <meta property="og:url" content="https://sidequest.app/" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <!-- summary_large_image para que se vea como una tarjeta grande
         (mejor CTR). Necesita imagen 1200x630 idealmente. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SideQuest — A social network for the real world" />
    <meta name="twitter:description" content="Find or create events around you and connect with friends. From screens to streets." />
    <meta name="twitter:image" content="/logoSideQuest.png" />

    <!-- ── Canonical (opcional pero recomendado) ── -->
    <!-- Le dice a Google "esta es la URL real" en caso de tener
         múltiples paths que sirvan el mismo contenido (www vs apex,
         http vs https, parámetros UTM...). Ajusta al dominio final. -->
    <link rel="canonical" href="https://sidequest.app/" />

    <!-- ────────────────────────────────────────────────────────
         DEPENDENCIAS EXTERNAS (sin cambios vs tu index.html)
         ──────────────────────────────────────────────────────── -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/front/main.jsx"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
