<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ════════════════════════════════════════════════════════════════
         SEO — Multilingüe (ES + EN)
         Keywords objetivo: red social, social network, eventos, events,
         side quest, sidequest, amigos, friends, encuentros, meetups,
         planes, plans, vida real, real life, organización, organize,
         movimiento, movement, gestión, manage, app, around me, cerca.

         IMPORTANTE: index.html es lo único que Google ve sin renderizar
         JS. Para títulos/descripciones POR RUTA, instalar react-helmet
         -async en el futuro y poner <Helmet> en cada page.
         ════════════════════════════════════════════════════════════════ -->

    <!-- ── Title (≤60 chars ideal; aquí 58) ── -->
    <title>SideQuest — Social network for real life events &amp; friends</title>

    <!-- ── Description (155-160 chars ideal) ──
         Texto en EN con términos que también matchean búsquedas en ES
         (eventos, amigos, planes, vida real ↔ events, friends, plans,
         real life). Google traduce el contexto entre idiomas razonablemente
         bien si el contenido tiene términos universales como "SideQuest". -->
    <meta name="description" content="SideQuest is the social network for the real world. Find or create events, meetups and plans around you. Connect with friends, organize, and move from screens to streets." />

    <!-- ── Keywords (Google ya no las usa, pero Bing y otros sí; harmless) ──
         Mezcla intencional EN+ES+FR para SEO multilingüe. -->
    <meta name="keywords" content="SideQuest, side quest, social network, red social, real life, vida real, events, eventos, evenements, meetups, encuentros, friends, amigos, amis, plans, planes, organize, organization, organización, gestion, gestión, movement, movimiento, mouvement, around me, cerca, near me, app, mobile app, app social, social app, community, comunidad, communauté" />

    <!-- ── Idioma + variantes geográficas ──
         hreflang le dice a Google que tienes versiones por idioma.
         Aunque ahora la UI es bilingüe (mezcla EN/ES), declaramos
         "x-default" como fallback universal. Si añades versiones
         oficiales por idioma, añade /es/, /en/, /fr/ aquí. -->
    <link rel="alternate" hreflang="x-default" href="https://sidequest.app/" />
    <link rel="alternate" hreflang="en" href="https://sidequest.app/" />
    <link rel="alternate" hreflang="es" href="https://sidequest.app/" />

    <!-- ── Author / canonical / robots ── -->
    <meta name="author" content="SideQuest" />
    <link rel="canonical" href="https://sidequest.app/" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <!-- Google-specific robot directives -->
    <meta name="googlebot" content="index,follow" />

    <!-- ── Color del chrome del navegador en móvil ── -->
    <meta name="theme-color" content="#0b0d12" />
    <meta name="color-scheme" content="dark" />

    <!-- ── PWA / Apple iOS ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SideQuest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Favicon e iconos ── -->
    <link rel="icon" type="image/png" href="/logoSideQuest.png" />
    <link rel="apple-touch-icon" href="/logoSideQuest.png" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn, Slack, Discord, Telegram...) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SideQuest" />
    <meta property="og:title" content="SideQuest — Social network for real life events &amp; friends" />
    <meta property="og:description" content="Find or create events, meetups and plans around you. The social network that connects people from screens to streets. Encuentros, amigos, eventos cerca de ti." />
    <meta property="og:image" content="/logoSideQuest.png" />
    <meta property="og:image:alt" content="SideQuest — A social network for the real world" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://sidequest.app/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SideQuest — Social network for real life events &amp; friends" />
    <meta name="twitter:description" content="Find or create events, meetups and plans around you. Encuentros, amigos, eventos cerca de ti." />
    <meta name="twitter:image" content="/logoSideQuest.png" />
    <meta name="twitter:image:alt" content="SideQuest — A social network for the real world" />

    <!-- ════════════════════════════════════════════════════════════════
         Schema.org JSON-LD — Rich Results para Google
         Le decimos a Google QUÉ ES esta app, no sólo cómo se llama.
         Esto es lo que dispara los "knowledge panels" y enriquece la
         tarjeta en los resultados (logo, link al sitio, redes sociales).

         Tipos usados:
           - Organization      → la empresa SideQuest
           - WebApplication    → la app en sí
           - WebSite           → con SearchAction si añades búsqueda
         ════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://sidequest.app/#organization",
          "name": "SideQuest",
          "url": "https://sidequest.app/",
          "logo": "https://sidequest.app/logoSideQuest.png",
          "sameAs": [
            "https://instagram.com/sidequest"
          ],
          "description": "A social network for the real world — connecting people from screens to streets."
        },
        {
          "@type": "WebSite",
          "@id": "https://sidequest.app/#website",
          "url": "https://sidequest.app/",
          "name": "SideQuest",
          "description": "Social network for real life events, meetups and friends.",
          "publisher": { "@id": "https://sidequest.app/#organization" },
          "inLanguage": ["en", "es", "fr"]
        },
        {
          "@type": "WebApplication",
          "@id": "https://sidequest.app/#webapp",
          "name": "SideQuest",
          "alternateName": ["Side Quest", "SQ"],
          "url": "https://sidequest.app/",
          "applicationCategory": "SocialNetworkingApplication",
          "operatingSystem": "Web, iOS, Android",
          "browserRequirements": "Requires JavaScript and modern browser (Chrome, Safari, Firefox, Edge).",
          "description": "SideQuest is the social network for the real world. Find or create events, meetups and plans around you. Connect with friends, organize, and move from screens to streets. Red social para encuentros, planes y eventos en la vida real.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR"
          },
          "featureList": [
            "Find events near you on the map",
            "Create your own events and invite friends",
            "Public or private event visibility",
            "Real-time chat with event participants and friends",
            "RSVP system (going, maybe, not going)",
            "Friend requests and connections",
            "Personal calendar with your events"
          ]
        }
      ]
    }
    </script>

    <!-- ════════════════════════════════════════════════════════════════
         DEPENDENCIAS EXTERNAS (sin cambios)
         ════════════════════════════════════════════════════════════════ -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- ── FALLBACK SIN JS ──
         Si JS está desactivado o falla, Google y los visitantes ven
         este contenido en vez de una página vacía. Mejora SEO en
         indexación inicial y accesibilidad. -->
    <noscript>
      <div style="padding:2rem; max-width:640px; margin:0 auto; color:#e9ecef; font-family:-apple-system,sans-serif;">
        <h1 style="color:#fff;">SideQuest</h1>
        <p>A social network for the real world. Find or create events, meetups and plans around you. Connect with friends, organize, and move from screens to streets.</p>
        <p>SideQuest es la red social para la vida real. Encuentra o crea eventos, encuentros y planes cerca de ti.</p>
        <p>This app requires JavaScript to run. Please enable it in your browser.</p>
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/front/main.jsx"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
